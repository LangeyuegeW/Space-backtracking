<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>宇宙漫游</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden; background: #000;
  touch-action: manipulation;
  -webkit-touch-callout: none;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* === 竖屏时强制将整个 App 旋转为横屏 === */
#app {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
}
/* 竖屏：把整个 App 旋转 90° 变成横屏显示 */
@media (orientation: portrait) {
  #app {
    width: 100vh; height: 100vw;
    transform: rotate(90deg) translateY(-100%);
    transform-origin: 0 0;
  }
}

canvas { display: block; }

#status {
  position: fixed; top: 10px; left: 0; right: 0; text-align: center;
  color: rgba(255,255,255,0.7); font-family: -apple-system, sans-serif;
  font-size: 13px; pointer-events: none; z-index: 5;
  text-shadow: 0 0 8px rgba(255,255,255,0.3);
  line-height: 1.5;
}

#room-info {
  position: fixed; top: 40px; left: 0; right: 0; text-align: center;
  color: rgba(255,255,255,0.4); font-family: -apple-system, monospace;
  font-size: 11px; pointer-events: none; z-index: 5;
}

#joystick-area {
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom, 0px));
  left: 20px; width: 120px; height: 120px; z-index: 10;
}
#joystick-base {
  width: 110px; height: 110px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.2);
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
#joystick-thumb {
  width: 46px; height: 46px; border-radius: 50%;
  background: rgba(255,255,255,0.3);
  box-shadow: 0 0 12px rgba(255,255,255,0.15);
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

.action-btn {
  position: fixed; width: 62px; height: 62px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.65); font-size: 26px;
  display: flex; align-items: center; justify-content: center;
  z-index: 10; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.action-btn.active {
  background: rgba(255,255,255,0.22);
  border-color: rgba(255,255,255,0.45);
  color: rgba(255,255,255,0.9);
  box-shadow: 0 0 16px rgba(255,255,255,0.2);
}
#btn-up {
  bottom: calc(118px + env(safe-area-inset-bottom, 0px));
  right: 22px;
}
#btn-down {
  bottom: calc(36px + env(safe-area-inset-bottom, 0px));
  right: 22px;
}

/* === 小地图 === */
#minimap {
  position: fixed;
  top: calc(8px + env(safe-area-inset-top, 0px));
  left: calc(8px + env(safe-area-inset-left, 0px));
  width: 110px; height: 110px;
  background: rgba(0,0,0,0.55);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 8px;
  z-index: 20;
  overflow: hidden;
  transition: all 0.25s ease;
  cursor: pointer;
}
#minimap canvas {
  width: 100%; height: 100%;
  display: block;
}
/* 放大状态 */
#minimap.expanded {
  width: min(78vw, 78vh);
  height: min(78vw, 78vh);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border-width: 3px;
  border-color: rgba(255,255,255,0.5);
  border-radius: 12px;
  background: rgba(0,0,0,0.85);
}
#minimap-close {
  display: none;
  position: absolute;
  top: 8px; right: 8px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-size: 18px;
  line-height: 32px;
  text-align: center;
  z-index: 21;
  cursor: pointer;
}
#minimap.expanded #minimap-close { display: block; }

</style>
</head>

  <div id="room-info"></div>

<script type="module">
import * as THREE from 'three';

// ============================================================
// 🔗 联机方式：Supabase Realtime 信令（零操作，全自动）
// ============================================================
// 房主打开页面 → 分享链接 → 客人点开链接 → 自动连接
// 无需复制粘贴、无需 PIN、无需手动交换任何信息
// ============================================================

// STUN 服务器（NAT 穿透用，Google 免费提供）
const RTC_CONFIG = {
  iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
};

// ============================================================
// 常量
// ============================================================

const MAX_PLAYERS = 4;
const SYNC_HZ = 20;
const SYNC_MS = 1000 / SYNC_HZ;
const COLORS = [
  '#FF4444', '#4488FF', '#44FF44', '#FF8844',
  '#FF44FF', '#44FFFF', '#FFFF44', '#FF6666'
];

// ============================================================
// 房间管理
// ============================================================

function genRoomId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id = '';
  for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

function genPlayerId() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxx-xxxx-xxxx'.replace(/x/g, () => (Math.random() * 16 | 0).toString(16));
}

const urlParams = new URLSearchParams(window.location.search);
const urlRoom = (urlParams.get('room') || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
const isHost = urlRoom.length < 3;
const roomId = isHost ? genRoomId() : urlRoom;
const myId = genPlayerId();
const myColor = COLORS[Math.floor(Math.random() * COLORS.length)];

console.log('%c🟢 你的颜色', `color:${myColor}`, myColor);
console.log('%c🆔 玩家 ID', 'color:#aaa', myId);
console.log(isHost ? '👑 你是房主' : `🔗 正在加入房间 ${roomId}`);

const colorRgb = {
  r: parseInt(myColor.slice(1, 3), 16) / 255,
  g: parseInt(myColor.slice(3, 5), 16) / 255,
  b: parseInt(myColor.slice(5, 7), 16) / 255
};

// ============================================================
// Canvas 纹理
// ============================================================

function createDotTex(color, size = 128) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const h = size / 2;
  const g = ctx.createRadialGradient(h, h, 0, h, h, h);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.12, color);
  g.addColorStop(0.4, color + '88');
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}

function createHaloTex(color, size = 256) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const h = size / 2;
  const g = ctx.createRadialGradient(h, h, h * 0.25, h, h, h);
  g.addColorStop(0, 'transparent');
  g.addColorStop(0.32, color + '33');
  g.addColorStop(0.48, color + '88');
  g.addColorStop(0.58, color + '44');
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}

// ============================================================
// 获取实际渲染尺寸（处理竖屏强制横屏的情况）
// ============================================================

function getRenderSize() {
  // 竖屏时 CSS 把 #app 旋转了，实际渲染宽高需要交换
  const isPortrait = window.matchMedia('(orientation: portrait)').matches;
  if (isPortrait) {
    return { w: window.innerHeight, h: window.innerWidth };
  }
  return { w: window.innerWidth, h: window.innerHeight };
}

// ============================================================
// Three.js 初始化
// ============================================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const initial = getRenderSize();
const camera = new THREE.PerspectiveCamera(70, initial.w / initial.h, 0.1, 1000);
camera.position.set(0, 6, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(initial.w, initial.h);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('app').prepend(renderer.domElement);

// ============================================================
// 本地玩家 3D 对象
// ============================================================

const localGroup = new THREE.Group();
scene.add(localGroup);

const dotTex = createDotTex(myColor);
const dotMat = new THREE.SpriteMaterial({ map: dotTex, depthTest: false, depthWrite: false });
const dotSprite = new THREE.Sprite(dotMat);
dotSprite.scale.set(2, 2, 1);
localGroup.add(dotSprite);

const haloTex = createHaloTex(myColor);
const haloMat = new THREE.SpriteMaterial({ map: haloTex, depthTest: false, depthWrite: false });
const haloSprite = new THREE.Sprite(haloMat);
haloSprite.scale.set(6, 6, 1);
localGroup.add(haloSprite);

const ringGeo = new THREE.TorusGeometry(0.55, 0.03, 16, 48);
const ringMat = new THREE.MeshBasicMaterial({ color: myColor, transparent: true, opacity: 0.55, depthTest: false, depthWrite: false });
const ringMesh = new THREE.Mesh(ringGeo, ringMat);
ringMesh.rotation.x = Math.PI / 2;
localGroup.add(ringMesh);

// ============================================================
// 远程玩家 3D 对象管理
// ============================================================

const remotePlayers = new Map();

function createRemotePlayer(id, color) {
  if (remotePlayers.has(id)) return;
  const group = new THREE.Group();

  const t = createDotTex(color, 64);
  const m = new THREE.SpriteMaterial({ map: t, depthTest: false, depthWrite: false });
  const dot = new THREE.Sprite(m);
  dot.scale.set(1.4, 1.4, 1);
  group.add(dot);

  const ht = createHaloTex(color, 128);
  const hm = new THREE.SpriteMaterial({ map: ht, depthTest: false, depthWrite: false });
  const halo = new THREE.Sprite(hm);
  halo.scale.set(3.5, 3.5, 1);
  group.add(halo);

  scene.add(group);
  remotePlayers.set(id, { group, targetPos: new THREE.Vector3(), lastUpdate: Date.now(), color });
  refreshHUD();
}

function updateRemoteTarget(id, x, y, z) {
  const rp = remotePlayers.get(id);
  if (!rp) return;
  rp.targetPos.set(x, y, z);
  rp.lastUpdate = Date.now();
}

function removeRemotePlayer(id) {
  const rp = remotePlayers.get(id);
  if (!rp) return;
  scene.remove(rp.group);
  rp.group.traverse(c => { if (c.material) { c.material.map?.dispose(); c.material.dispose(); } });
  remotePlayers.delete(id);
  refreshHUD();
}

function clearRemotePlayers() {
  for (const id of remotePlayers.keys()) removeRemotePlayer(id);
}

// ============================================================
// 拖尾系统
// ============================================================

const TRAIL_LEN = 25;
const trailPosArr = new Float32Array(TRAIL_LEN * 3);
const trailColArr = new Float32Array(TRAIL_LEN * 3);
const trailHistory = [];

const trailGeo = new THREE.BufferGeometry();
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPosArr, 3));
trailGeo.setAttribute('color', new THREE.BufferAttribute(trailColArr, 3));
trailGeo.setDrawRange(0, 0);

const trailMat = new THREE.LineBasicMaterial({
  vertexColors: true, transparent: true, opacity: 0.6,
  depthTest: false, depthWrite: false
});
const trailLine = new THREE.Line(trailGeo, trailMat);
scene.add(trailLine);

function updateTrail(pos) {
  trailHistory.push(pos.clone());
  if (trailHistory.length > TRAIL_LEN) trailHistory.shift();
  const len = trailHistory.length;
  for (let i = 0; i < len; i++) {
    const p = trailHistory[i];
    const t = i / (TRAIL_LEN - 1);
    const a = t * 0.55;
    const j = i * 3;
    trailPosArr[j] = p.x;
    trailPosArr[j + 1] = p.y;
    trailPosArr[j + 2] = p.z;
    trailColArr[j] = colorRgb.r * a;
    trailColArr[j + 1] = colorRgb.g * a;
    trailColArr[j + 2] = colorRgb.b * a;
  }
  trailGeo.attributes.position.needsUpdate = true;
  trailGeo.attributes.color.needsUpdate = true;
  trailGeo.setDrawRange(0, len);
}

// ============================================================
// HUD
// ============================================================

const statusEl = document.getElementById('status');
const roomEl = document.getElementById('room-info');

function setStatus(text) { statusEl.textContent = text; }

function refreshHUD() {
  const n = remotePlayers.size + 1;
  if (isHost) {
    setStatus(`👑 房主 · ${n}/${MAX_PLAYERS} 人 · 房间 ${roomId}`);
  } else {
    setStatus(`🔗 已加入 · ${n}/${MAX_PLAYERS} 人 · 房间 ${roomId}`);
  }
}

// ============================================================
// 虚拟摇杆
// ============================================================

const joyArea = document.getElementById('joystick-area');
const joyThumb = document.getElementById('joystick-thumb');
let joyTouchId = null;
let joyInputX = 0, joyInputY = 0;

function joyCenter() {
  const r = joyArea.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}
function nearJoy(cx, cy) {
  const c = joyCenter();
  return Math.hypot(cx - c.x, cy - c.y) < 70;
}
function updateJoy(cx, cy) {
  const c = joyCenter();
  let dx = cx - c.x, dy = cy - c.y;
  const dist = Math.hypot(dx, dy);
  const maxR = 32;
  if (dist > maxR) { dx = dx / dist * maxR; dy = dy / dist * maxR; }
  joyThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  joyInputX = dx / maxR;
  joyInputY = -dy / maxR;
}
function resetJoy() {
  joyThumb.style.transform = 'translate(-50%, -50%)';
  joyInputX = 0; joyInputY = 0;
}

// ============================================================
// 按钮触摸
// ============================================================

let upTouchId = null, downTouchId = null;
let btnUpActive = false, btnDownActive = false;
const btnUp = document.getElementById('btn-up');
const btnDown = document.getElementById('btn-down');

function hitBtn(touch, btn) {
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  return el === btn || btn.contains(el);
}

document.addEventListener('touchstart', e => {
  // 连接码界面不拦截（允许输入 PIN / 点击按钮 / 选择文字）
  // 小地图展开时不处理游戏触控
  if (minimapExpanded && minimapEl.contains(e.target)) return;
  for (const t of e.changedTouches) {
    if (joyTouchId === null && nearJoy(t.clientX, t.clientY)) {
      joyTouchId = t.identifier; updateJoy(t.clientX, t.clientY); continue;
    }
    if (upTouchId === null && hitBtn(t, btnUp)) {
      upTouchId = t.identifier; btnUpActive = true; btnUp.classList.add('active'); continue;
    }
    if (downTouchId === null && hitBtn(t, btnDown)) {
      downTouchId = t.identifier; btnDownActive = true; btnDown.classList.add('active'); continue;
    }
  }
  e.preventDefault();
}, { passive: false });

document.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === joyTouchId) updateJoy(t.clientX, t.clientY);
  }
  e.preventDefault();
}, { passive: false });

function releaseTouch(id) {
  if (id === joyTouchId) { resetJoy(); joyTouchId = null; }
  if (id === upTouchId)   { btnUpActive = false; upTouchId = null; btnUp.classList.remove('active'); }
  if (id === downTouchId) { btnDownActive = false; downTouchId = null; btnDown.classList.remove('active'); }
}

document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) releaseTouch(t.identifier);
  e.preventDefault();
}, { passive: false });
document.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) releaseTouch(t.identifier);
});

// ============================================================
// 键盘 (桌面)
// ============================================================

const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; e.preventDefault(); });

// ============================================================
// WebRTC + Supabase Realtime 信令（零操作联机）
// ============================================================
// 1. 到 https://supabase.com 创建项目
// 2. Project Settings → API 复制 URL 和 anon key
// 3. Replication → Realtime 开启 Broadcast 模式

const SUPABASE_URL = 'https://vjowejxzlljwnxcgkcdu.supabase.co';
const SUPABASE_KEY=
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqb3dlanh6bGxqd254Y2drY2R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MjAyNDMsImV4cCI6MjA5NjM5NjI0M30.W6-mnyKuK4nj8kJ9LeiZPwoPdrC4PMeXlNKStxz3l6k';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let peerConns = new Map();       // peerId → RTCPeerConnection
let gameChannels = new Map();    // peerId → RTCDataChannel (房主用)
let hostChannel = null;          // 客人到房主的 DataChannel
let guestColors = new Map();     // peerId → color (房主用)

// --- 等待 ICE 收集 ---
function waitForIceComplete(pc) {
  return new Promise(resolve => {
    if (pc.iceGatheringState === 'complete') { resolve(); return; }
    const t = setTimeout(() => resolve(), 3000);
    pc.onicegatheringstatechange = () => {
      if (pc.iceGatheringState === 'complete') { clearTimeout(t); resolve(); }
    };
  });
}

// --- 客人断开 ---
function onGuestLeave(guestId) {
  console.log('📤 客人断开:', guestId.slice(0, 8));
  const pc = peerConns.get(guestId);
  if (pc) { pc.close(); peerConns.delete(guestId); }
  gameChannels.delete(guestId);
  guestColors.delete(guestId);
  removeRemotePlayer(guestId);
  refreshHUD();
}

// ============================================================
// 房主：处理新客人加入（自动，无手动操作）
// ============================================================

async function hostHandleJoin(guestId) {
  if (gameChannels.size >= MAX_PLAYERS - 1) {
    channel.send({ type: 'broadcast', event: 'signal', payload: { sender: myId, receiver: guestId, type: 'room-full' } });
    return;
  }

  const pc = new RTCPeerConnection(RTC_CONFIG);
  const dc = pc.createDataChannel('game', { ordered: false, maxRetransmits: 0 });
  peerConns.set(guestId, pc);

  let joined = false;
  dc.onopen = () => {
    console.log('📥 通道开启:', guestId.slice(0, 8));
    const list = [{ id: myId, color: myColor }];
    for (const [gid, col] of guestColors) list.push({ id: gid, color: col });
    dc.send(JSON.stringify({ type: 'welcome', players: list }));
  };
  dc.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'join' && !joined) {
      joined = true;
      guestColors.set(guestId, data.color);
      createRemotePlayer(guestId, data.color);
      refreshHUD();
    } else if (data.type === 'pos') {
      updateRemoteTarget(guestId, data.x, data.y, data.z);
    }
  };
  dc.onclose = () => { onGuestLeave(guestId); };

  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
      onGuestLeave(guestId);
    }
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      channel.send({ type: 'broadcast', event: 'signal', payload: { sender: myId, receiver: guestId, type: 'ice', data: e.candidate } });
    }
  };

  try {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await waitForIceComplete(pc);
  } catch(e) {
    console.error('生成 offer 失败:', e);
    onGuestLeave(guestId);
    return;
  }

  gameChannels.set(guestId, dc);
  channel.send({ type: 'broadcast', event: 'signal', payload: { sender: myId, receiver: guestId, type: 'offer', data: pc.localDescription } });
}

// ============================================================
// 客人：处理房主 offer
// ============================================================

async function guestHandleOffer(hostId, offer) {
  const pc = new RTCPeerConnection(RTC_CONFIG);
  peerConns.set(hostId, pc);

  pc.ondatachannel = (e) => {
    hostChannel = e.channel;
    hostChannel.onopen = () => {
      console.log('📥 已连接到房主');
      hostChannel.send(JSON.stringify({ type: 'join', id: myId, color: myColor }));
      refreshHUD();
    };
    hostChannel.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'welcome') {
        for (const p of msg.players) {
          if (p.id !== myId) createRemotePlayer(p.id, p.color);
        }
        refreshHUD();
      } else if (msg.type === 'sync') {
        const ids = new Set();
        for (const p of msg.players) {
          ids.add(p.id);
          if (p.id === myId) continue;
          if (!remotePlayers.has(p.id)) createRemotePlayer(p.id, p.color);
          updateRemoteTarget(p.id, p.x, p.y, p.z);
        }
        for (const [id] of remotePlayers) {
          if (!ids.has(id)) removeRemotePlayer(id);
        }
      } else if (msg.type === 'room-full') {
        setStatus('⚠️ 房间已满 (4/4)');
      }
    };
    hostChannel.onclose = () => {
      setStatus('⚠️ 房主已断开');
      clearRemotePlayers();
      hostChannel = null;
    };
  };

  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
      setStatus('⚠️ 房主已断开');
      clearRemotePlayers();
      hostChannel = null;
    }
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      channel.send({ type: 'broadcast', event: 'signal', payload: { sender: myId, receiver: hostId, type: 'ice', data: e.candidate } });
    }
  };

  try {
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await waitForIceComplete(pc);
  } catch(e) {
    console.error('连接失败:', e);
    setStatus('⚠️ 连接失败: ' + e.message);
    peerConns.delete(hostId);
    return;
  }

  channel.send({ type: 'broadcast', event: 'signal', payload: { sender: myId, receiver: hostId, type: 'answer', data: pc.localDescription } });
}

// ============================================================
// Supabase Realtime 信令通道
// ============================================================

const channel = supabaseClient.channel('room-' + roomId);
channel.on('broadcast', { event: 'signal' }, (msg) => {
  const { sender, receiver, type, data } = msg.payload;
  if (sender === myId) return;

  if (type === 'join') {
    if (isHost) hostHandleJoin(sender);
  } else if (type === 'offer') {
    if (!isHost && receiver === myId) guestHandleOffer(sender, data);
  } else if (type === 'answer') {
    if (isHost && receiver === myId) {
      const pc = peerConns.get(sender);
      if (pc) pc.setRemoteDescription(new RTCSessionDescription(data)).catch(e => console.error('setRemote failed:', e));
    }
  } else if (type === 'ice') {
    const pc = peerConns.get(sender);
    if (pc) pc.addIceCandidate(new RTCIceCandidate(data)).catch(() => {});
  } else if (type === 'room-full') {
    setStatus('⚠️ 房间已满 (4/4)');
  }
});

channel.subscribe((status) => {
  if (status === 'SUBSCRIBED') {
    console.log('✅ Supabase 通道已连接:', roomId);
    if (isHost) {
      setStatus(`👑 房主 · 房间 ${roomId}`);
      window.history.replaceState(null, '', '?room=' + roomId);
      document.getElementById('room-info').textContent = '分享链接邀请朋友加入';
    } else {
      setStatus(`🔗 正在加入房间 ${roomId}`);
      channel.send({ type: 'broadcast', event: 'signal', payload: { sender: myId, receiver: 'host', type: 'join' } });
    }
    refreshHUD();
  }
});

// --- 广播/发送位置 ---
function hostBroadcast() {
  if (gameChannels.size === 0) return;
  const players = [{
    id: myId,
    x: Math.round(localGroup.position.x * 100) / 100,
    y: Math.round(localGroup.position.y * 100) / 100,
    z: Math.round(localGroup.position.z * 100) / 100,
    color: myColor
  }];
  for (const [gid, col] of guestColors) {
    const rp = remotePlayers.get(gid);
    const p = rp ? rp.targetPos : { x: 0, y: 0, z: 0 };
    players.push({
      id: gid,
      x: Math.round(p.x * 100) / 100,
      y: Math.round(p.y * 100) / 100,
      z: Math.round(p.z * 100) / 100,
      color: col
    });
  }
  const msg = JSON.stringify({ type: 'sync', players });
  for (const [, dc] of gameChannels) {
    if (dc.readyState === 'open') { try { dc.send(msg); } catch (e) {} }
  }
}

function guestSendPos() {
  if (!hostChannel || hostChannel.readyState !== 'open') return;
  const pos = localGroup.position;
  try {
    hostChannel.send(JSON.stringify({
      type: 'pos',
      x: Math.round(pos.x * 100) / 100,
      y: Math.round(pos.y * 100) / 100,
      z: Math.round(pos.z * 100) / 100
    }));
  } catch (e) {}
}

// ============================================================
// 小地图
// ============================================================

const minimapEl = document.getElementById('minimap');
const minimapCanvas = document.getElementById('minimap-canvas');
const minimapCtx = minimapCanvas.getContext('2d');
const minimapClose = document.getElementById('minimap-close');
let minimapExpanded = false;

// 小地图绘制尺寸（实际像素，比 CSS 大以保持清晰）
const MM_SIZE = 220;
minimapCanvas.width = MM_SIZE;
minimapCanvas.height = MM_SIZE;

// 切换放大
function toggleMinimap(e) {
  if (e && minimapClose.contains(e.target)) return;
  minimapExpanded = !minimapExpanded;
  if (minimapExpanded) {
    minimapEl.classList.add('expanded');
    minimapCanvas.width = 512;
    minimapCanvas.height = 512;
  } else {
    minimapEl.classList.remove('expanded');
    minimapCanvas.width = MM_SIZE;
    minimapCanvas.height = MM_SIZE;
  }
}

// 小地图点击（桌面用 click，手机用 touchstart 防止被全局拦截）
minimapEl.addEventListener('click', toggleMinimap);
minimapEl.addEventListener('touchstart', e => {
  e.stopPropagation(); // 阻止冒泡到 document 的全局 touchstart
  if (!minimapExpanded) {
    toggleMinimap();
  }
}, { passive: true });

// 关闭按钮
function closeMinimap(e) {
  e.stopPropagation();
  e.preventDefault();
  minimapExpanded = false;
  minimapEl.classList.remove('expanded');
  minimapCanvas.width = MM_SIZE;
  minimapCanvas.height = MM_SIZE;
}
minimapClose.addEventListener('click', closeMinimap);
minimapClose.addEventListener('touchstart', closeMinimap, { passive: false });

function drawMinimap() {
  const ctx = minimapCtx;
  const w = minimapCanvas.width;
  const h = minimapCanvas.height;
  const cx = w / 2, cy = h / 2;

  // 动态缩放范围：覆盖所有玩家
  let maxDist = 30; // 默认可视 30 单位半径
  for (const [, rp] of remotePlayers) {
    const d = Math.max(
      Math.abs(rp.targetPos.x - localGroup.position.x),
      Math.abs(rp.targetPos.z - localGroup.position.z)
    );
    if (d + 10 > maxDist) maxDist = d + 10;
  }

  const scale = (w * 0.42) / maxDist; // 像素/单位
  const worldToScreen = (wx, wz) => ({
    sx: cx + (wx - localGroup.position.x) * scale,
    sy: cy - (wz - localGroup.position.z) * scale
  });

  // 清屏
  ctx.clearRect(0, 0, w, h);

  // 网格
  const gridStep = Math.max(5, Math.round(maxDist / 4));
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  for (let gx = -maxDist; gx <= maxDist; gx += gridStep) {
    const a = worldToScreen(gx, -maxDist);
    const b = worldToScreen(gx, maxDist);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
  }
  for (let gz = -maxDist; gz <= maxDist; gz += gridStep) {
    const a = worldToScreen(-maxDist, gz);
    const b = worldToScreen(maxDist, gz);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
  }

  // 刻度标记
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = `${Math.max(8, w / 28)}px monospace`;
  ctx.textAlign = 'center';
  for (let g = -maxDist; g <= maxDist; g += gridStep * 2) {
    const p = worldToScreen(g, maxDist);
    ctx.fillText(g, p.sx, Math.min(h - 4, p.sy + 12));
  }

  // 绘制其他玩家
  const dotR = Math.max(2.5, w / 70);
  for (const [, rp] of remotePlayers) {
    const p = worldToScreen(rp.targetPos.x, rp.targetPos.z);
    if (p.sx < -10 || p.sx > w + 10 || p.sy < -10 || p.sy > h + 10) continue;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(p.sx, p.sy, dotR + 1, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = rp.color || '#cccccc';
    ctx.beginPath(); ctx.arc(p.sx, p.sy, dotR, 0, Math.PI * 2); ctx.fill();
  }

  // 绘制自己（中心，稍大）
  const me = worldToScreen(localGroup.position.x, localGroup.position.z);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(me.sx, me.sy, dotR + 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = myColor;
  ctx.beginPath(); ctx.arc(me.sx, me.sy, dotR + 1.5, 0, Math.PI * 2); ctx.fill();

  // 方向指示（小三角形）
  const forward = worldToScreen(
    localGroup.position.x,
    localGroup.position.z + 4
  );
  const left = worldToScreen(
    localGroup.position.x - 2,
    localGroup.position.z - 2
  );
  const right = worldToScreen(
    localGroup.position.x + 2,
    localGroup.position.z - 2
  );
  ctx.fillStyle = myColor;
  ctx.beginPath();
  ctx.moveTo(forward.sx, forward.sy);
  ctx.lineTo(left.sx, left.sy);
  ctx.lineTo(right.sx, right.sy);
  ctx.closePath(); ctx.fill();

  // 边框
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, w - 1, h - 1);

  // 放大时显示比例尺
  if (minimapExpanded) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`1格 = ${gridStep} 单位`, 8, h - 8);
  }
}

// ============================================================
// 游戏主循环
// ============================================================

const clock = new THREE.Clock();
const SPEED = 10;
let lastSync = 0;

function animate(ts) {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);

  let mx = joyInputX, mz = joyInputY;
  let mu = btnUpActive, md = btnDownActive;
  if (joyTouchId === null) {
    if (keys['w'] || keys['W'] || keys['ArrowUp'])    mz = 1;
    if (keys['s'] || keys['S'] || keys['ArrowDown'])  mz = -1;
    if (keys['a'] || keys['A'] || keys['ArrowLeft'])  mx = -1;
    if (keys['d'] || keys['D'] || keys['ArrowRight']) mx = 1;
  }
  if (keys['q'] || keys['Q'] || keys[' '])    mu = true;
  if (keys['e'] || keys['E'] || keys['Shift']) md = true;

  const pos = localGroup.position;
  pos.x += mx * SPEED * dt;
  pos.z += mz * SPEED * dt;
  if (mu) pos.y += SPEED * dt;
  if (md) pos.y -= SPEED * dt;
  localGroup.position.copy(pos);

  updateTrail(pos);

  const pulse = 1 + Math.sin(ts * 0.002) * 0.12;
  haloSprite.scale.set(6 * pulse, 6 * pulse, 1);

  const tc = new THREE.Vector3(pos.x, pos.y + 6, pos.z + 10);
  camera.position.lerp(tc, 0.06);
  camera.lookAt(pos.x, pos.y, pos.z);

  for (const [, rp] of remotePlayers) {
    rp.group.position.lerp(rp.targetPos, 0.15);
  }

  if (ts - lastSync > SYNC_MS) {
    lastSync = ts;
    if (isHost) hostBroadcast();
    else guestSendPos();
  }

  const now = Date.now();
  for (const [id, rp] of remotePlayers) {
    if (now - rp.lastUpdate > 10000) removeRemotePlayer(id);
  }

  drawMinimap();
  renderer.render(scene, camera);
}

// ============================================================
// 窗口自适应（处理竖屏强制横屏的尺寸交换）
// ============================================================

function updateSizes() {
  const { w, h } = getRenderSize();
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

window.addEventListener('resize', updateSizes);
window.addEventListener('orientationchange', () => {
  // 等待 CSS 旋转生效后再更新尺寸
  setTimeout(updateSizes, 200);
});

// ============================================================
// 清理
// ============================================================

window.addEventListener('beforeunload', () => {
  peerConns.forEach(pc => { try { pc.close(); } catch(e) {} });
});

// ============================================================
// 启动
// ============================================================

refreshHUD();
animate(performance.now());
</script>
